services:
  postgres:
    image: pgvector/pgvector:0.8.3-pg17-trixie
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_MIGRATION_USER}
      POSTGRES_PASSWORD: ${POSTGRES_MIGRATION_PASSWORD}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD}
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  redis:
    image: redis:8.8.0-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      CONTEXTOS_APPLICATION_NAME: ${CONTEXTOS_APPLICATION_NAME:-contextos-api}
      CONTEXTOS_APPLICATION_VERSION: ${CONTEXTOS_APPLICATION_VERSION:-0.1.0}
      CONTEXTOS_ENVIRONMENT: ${CONTEXTOS_ENVIRONMENT:-local}
      CONTEXTOS_LOG_LEVEL: ${CONTEXTOS_LOG_LEVEL:-INFO}
      CONTEXTOS_LOG_FORMAT: ${CONTEXTOS_LOG_FORMAT:-json}
      CONTEXTOS_READINESS_TIMEOUT_SECONDS: ${CONTEXTOS_READINESS_TIMEOUT_SECONDS:-3}
      CONTEXTOS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_MIGRATION_USER}:${POSTGRES_MIGRATION_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CONTEXTOS_MIGRATION_DATABASE_URL: postgresql+asyncpg://${POSTGRES_MIGRATION_USER}:${POSTGRES_MIGRATION_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CONTEXTOS_REDIS_URL: redis://redis:6379/0
      POSTGRES_APP_USER: ${POSTGRES_APP_USER}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/app/.venv/bin/alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      CONTEXTOS_RETRIEVAL_SIMILARITY_THRESHOLD: ${CONTEXTOS_RETRIEVAL_SIMILARITY_THRESHOLD:-0.72}
      CONTEXTOS_RETRIEVAL_TOP_K: ${CONTEXTOS_RETRIEVAL_TOP_K:-5}
      CONTEXTOS_RETRIEVAL_MAX_CONTEXT_CHARACTERS: ${CONTEXTOS_RETRIEVAL_MAX_CONTEXT_CHARACTERS:-9000}
      CONTEXTOS_APPLICATION_NAME: ${CONTEXTOS_APPLICATION_NAME:-contextos-api}
      CONTEXTOS_APPLICATION_VERSION: ${CONTEXTOS_APPLICATION_VERSION:-0.1.0}
      CONTEXTOS_ENVIRONMENT: ${CONTEXTOS_ENVIRONMENT:-local}
      CONTEXTOS_LOG_LEVEL: ${CONTEXTOS_LOG_LEVEL:-INFO}
      CONTEXTOS_LOG_FORMAT: ${CONTEXTOS_LOG_FORMAT:-json}
      CONTEXTOS_READINESS_TIMEOUT_SECONDS: ${CONTEXTOS_READINESS_TIMEOUT_SECONDS:-3}
      CONTEXTOS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CONTEXTOS_MIGRATION_DATABASE_URL: postgresql+asyncpg://${POSTGRES_MIGRATION_USER}:${POSTGRES_MIGRATION_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CONTEXTOS_REDIS_URL: redis://redis:6379/0
      CONTEXTOS_SUPABASE_URL: ${CONTEXTOS_SUPABASE_URL:-}
      CONTEXTOS_SUPABASE_JWT_ISSUER: ${CONTEXTOS_SUPABASE_JWT_ISSUER:-}
      CONTEXTOS_SUPABASE_JWT_AUDIENCE: ${CONTEXTOS_SUPABASE_JWT_AUDIENCE:-authenticated}
      CONTEXTOS_SUPABASE_JWKS_URL: ${CONTEXTOS_SUPABASE_JWKS_URL:-}
      CONTEXTOS_SUPABASE_SECRET_KEY: ${CONTEXTOS_SUPABASE_SECRET_KEY:-}
      CONTEXTOS_FRONTEND_URL: ${CONTEXTOS_FRONTEND_URL:-http://localhost:3000}
      CONTEXTOS_BETA_MAX_USERS: ${CONTEXTOS_BETA_MAX_USERS:-3}
      CONTEXTOS_DOCUMENT_STORAGE_BACKEND: ${CONTEXTOS_DOCUMENT_STORAGE_BACKEND:-local}
      CONTEXTOS_DOCUMENT_STORAGE_ROOT: /var/lib/contextos/private-documents
      CONTEXTOS_SUPABASE_STORAGE_BUCKET: ${CONTEXTOS_SUPABASE_STORAGE_BUCKET:-}
      CONTEXTOS_SUPABASE_STORAGE_PATH_PREFIX: ${CONTEXTOS_SUPABASE_STORAGE_PATH_PREFIX:-documents}
      CONTEXTOS_DOCUMENT_MAX_PER_USER: ${CONTEXTOS_DOCUMENT_MAX_PER_USER:-10}
      CONTEXTOS_DOCUMENT_MAX_PDF_SIZE_BYTES: ${CONTEXTOS_DOCUMENT_MAX_PDF_SIZE_BYTES:-10485760}
      CONTEXTOS_DOCUMENT_MAX_TOTAL_SIZE_BYTES: ${CONTEXTOS_DOCUMENT_MAX_TOTAL_SIZE_BYTES:-52428800}
      CONTEXTOS_DOCUMENT_MAX_PAGES: ${CONTEXTOS_DOCUMENT_MAX_PAGES:-100}
      CONTEXTOS_DOCUMENT_CHUNK_SIZE: ${CONTEXTOS_DOCUMENT_CHUNK_SIZE:-1800}
      CONTEXTOS_DOCUMENT_CHUNK_OVERLAP: ${CONTEXTOS_DOCUMENT_CHUNK_OVERLAP:-200}
      CONTEXTOS_DOCUMENT_QUEUE_NAME: ${CONTEXTOS_DOCUMENT_QUEUE_NAME:-contextos-ingestion}
      CONTEXTOS_LLM_PROVIDER: ${CONTEXTOS_LLM_PROVIDER:-fake}
      CONTEXTOS_LLM_MODEL: ${CONTEXTOS_LLM_MODEL:-gemini-2.5-flash}
      CONTEXTOS_EMBEDDING_PROVIDER: ${CONTEXTOS_EMBEDDING_PROVIDER:-fake}
      CONTEXTOS_EMBEDDING_MODEL: ${CONTEXTOS_EMBEDDING_MODEL:-text-embedding-004}
      CONTEXTOS_EMBEDDING_DIMENSION: ${CONTEXTOS_EMBEDDING_DIMENSION:-768}
      CONTEXTOS_AI_PROVIDER_TIMEOUT_SECONDS: ${CONTEXTOS_AI_PROVIDER_TIMEOUT_SECONDS:-12}
      CONTEXTOS_AI_PROVIDER_MAX_RETRIES: ${CONTEXTOS_AI_PROVIDER_MAX_RETRIES:-2}
      CONTEXTOS_AI_PROVIDER_API_KEY: ${CONTEXTOS_AI_PROVIDER_API_KEY:-}
      CONTEXTOS_AI_DAILY_MESSAGE_LIMIT: ${CONTEXTOS_AI_DAILY_MESSAGE_LIMIT:-20}
      CONTEXTOS_AI_MONTHLY_MESSAGE_LIMIT: ${CONTEXTOS_AI_MONTHLY_MESSAGE_LIMIT:-200}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - document_storage:/var/lib/contextos/private-documents
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["/app/.venv/bin/python", "-m", "contextos.worker"]
    environment:
      CONTEXTOS_RETRIEVAL_SIMILARITY_THRESHOLD: ${CONTEXTOS_RETRIEVAL_SIMILARITY_THRESHOLD:-0.72}
      CONTEXTOS_APPLICATION_NAME: ${CONTEXTOS_APPLICATION_NAME:-contextos-api}
      CONTEXTOS_APPLICATION_VERSION: ${CONTEXTOS_APPLICATION_VERSION:-0.1.0}
      CONTEXTOS_ENVIRONMENT: ${CONTEXTOS_ENVIRONMENT:-local}
      CONTEXTOS_LOG_LEVEL: ${CONTEXTOS_LOG_LEVEL:-INFO}
      CONTEXTOS_LOG_FORMAT: ${CONTEXTOS_LOG_FORMAT:-json}
      CONTEXTOS_RETRIEVAL_TOP_K: ${CONTEXTOS_RETRIEVAL_TOP_K:-5}
      CONTEXTOS_RETRIEVAL_MAX_CONTEXT_CHARACTERS: ${CONTEXTOS_RETRIEVAL_MAX_CONTEXT_CHARACTERS:-9000}
      CONTEXTOS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CONTEXTOS_REDIS_URL: redis://redis:6379/0
      CONTEXTOS_SUPABASE_URL: ${CONTEXTOS_SUPABASE_URL:-}
      CONTEXTOS_SUPABASE_SECRET_KEY: ${CONTEXTOS_SUPABASE_SECRET_KEY:-}
      CONTEXTOS_DOCUMENT_STORAGE_BACKEND: ${CONTEXTOS_DOCUMENT_STORAGE_BACKEND:-local}
      CONTEXTOS_DOCUMENT_STORAGE_ROOT: /var/lib/contextos/private-documents
      CONTEXTOS_SUPABASE_STORAGE_BUCKET: ${CONTEXTOS_SUPABASE_STORAGE_BUCKET:-}
      CONTEXTOS_SUPABASE_STORAGE_PATH_PREFIX: ${CONTEXTOS_SUPABASE_STORAGE_PATH_PREFIX:-documents}
      CONTEXTOS_DOCUMENT_MAX_PAGES: ${CONTEXTOS_DOCUMENT_MAX_PAGES:-100}
      CONTEXTOS_DOCUMENT_CHUNK_SIZE: ${CONTEXTOS_DOCUMENT_CHUNK_SIZE:-1800}
      CONTEXTOS_DOCUMENT_CHUNK_OVERLAP: ${CONTEXTOS_DOCUMENT_CHUNK_OVERLAP:-200}
      CONTEXTOS_DOCUMENT_QUEUE_NAME: ${CONTEXTOS_DOCUMENT_QUEUE_NAME:-contextos-ingestion}
      CONTEXTOS_LLM_PROVIDER: ${CONTEXTOS_LLM_PROVIDER:-fake}
      CONTEXTOS_LLM_MODEL: ${CONTEXTOS_LLM_MODEL:-gemini-2.5-flash}
      CONTEXTOS_EMBEDDING_PROVIDER: ${CONTEXTOS_EMBEDDING_PROVIDER:-fake}
      CONTEXTOS_EMBEDDING_MODEL: ${CONTEXTOS_EMBEDDING_MODEL:-text-embedding-004}
      CONTEXTOS_EMBEDDING_DIMENSION: ${CONTEXTOS_EMBEDDING_DIMENSION:-768}
      CONTEXTOS_AI_PROVIDER_TIMEOUT_SECONDS: ${CONTEXTOS_AI_PROVIDER_TIMEOUT_SECONDS:-12}
      CONTEXTOS_AI_PROVIDER_MAX_RETRIES: ${CONTEXTOS_AI_PROVIDER_MAX_RETRIES:-2}
      CONTEXTOS_AI_PROVIDER_API_KEY: ${CONTEXTOS_AI_PROVIDER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - document_storage:/var/lib/contextos/private-documents

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000	
      CONTEXTOS_API_URL: http://api:8000
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:54321}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-local-publishable-key}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  document_storage:
