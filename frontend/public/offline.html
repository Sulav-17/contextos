<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>ContextOS offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #050912;
        color: #f3f7fb;
      }
      body {
        display: grid;
        min-height: 100dvh;
        margin: 0;
        place-items: center;
        padding: 1.5rem;
      }
      main {
        max-width: 32rem;
        border: 1px solid rgba(183, 196, 212, 0.2);
        border-radius: 0.5rem;
        background: #0b1220;
        padding: 1.5rem;
      }
      p {
        color: #b7c4d4;
        line-height: 1.6;
      }
      a {
        color: #50d9f6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ContextOS is offline</h1>
      <p>
        Reconnect to use chat, uploads, memories, synchronization, or private document downloads.
        Private workspace data is not stored in this offline page.
      </p>
      <p><a href="/home">Try ContextOS again</a></p>
    </main>
  </body>
</html>
